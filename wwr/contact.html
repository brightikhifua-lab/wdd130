<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Titans</title>
  <meta name="description"
    content="Get in touch with White Water Titans. Plan your next river rafting adventure, check out our office location, meet our guides, or send us an inquiry.">
  <meta name="author" content="Ikhifua Bright Ifiok">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <header>
    <div class="logo-box">
      <img src="images/logo.png" alt="White Water Titans Logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="company-heading">
      <h1>White Water Titans</h1>
      <p class="company-address">123 Main River Street<br>Salmon, Idaho<br>+1 999 999
        9999<br>info@whitewatertitans.com</p>
    </section>

    <div class="contact-grid">
      <div class="map-box">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5684.872297125301!2d-113.8994793!3d45.1760072!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5359196bbf083581%3A0xc0fb1d3f9602f2ab!2sSalmon%2C%20ID%2083467!5e0!3m2!1sen!2sus!4v1717523200000!5m2!1sen!2sus"
          width="600" height="450" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>

      <div class="form-box">
        <form action="#" method="post">
          <div class="input-control">
            <label for="visitor-name">Name</label>
            <input type="text" id="visitor-name" name="visitor-name" placeholder="Name" required>
          </div>

          <div class="input-control">
            <label for="visitor-email">Email</label>
            <input type="email" id="visitor-email" name="visitor-email" placeholder="Email"
              required>
          </div>

          <fieldset class="purpose-selection">
            <legend>Message Purpose</legend>
            <div class="radio-item">
              <input type="radio" id="general" name="purpose" value="general" checked>
              <label for="general">General Inquiry</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="reservation" name="purpose" value="reservation">
              <label for="reservation">Reservation Question</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="suggestion" name="purpose" value="suggestion">
              <label for="suggestion">Website Suggestion</label>
            </div>
          </fieldset>

          <div class="input-control">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Type here"
              required></textarea>
          </div>

          <div class="checkbox-control">
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
          </div>

          <button type="submit">Get in Touch!</button>
        </form>
      </div>
    </div>

    <section class="management-section">
      <h2>We Are Here to Serve You</h2>
      <div class="management-grid">
        <figure>
          <img src="images/hero.jpg" alt="Employee Profile Placeholder 1">
          <figcaption><strong>Marcus Vance</strong><br>Lead Safety Coordinator</figcaption>
        </figure>
        <figure>
          <img src="images/hero.jpg" alt="Employee Profile Placeholder 2">
          <figcaption><strong>Elena Rostova</strong><br>Rapid Logistics Director</figcaption>
        </figure>
        <figure>
          <img src="images/hero.jpg" alt="Employee Profile Placeholder 3">
          <figcaption><strong>Ikhifua Bright Ifiok</strong><br>Founder & Master Guide</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer>
    <p>©2026 ❖ White Water Titans ❖ Ikhifua Bright Ifiok</p>
    <nav class="socialmedia">
      <a href="https://facebook.com" target="_blank">
        <img src="images/facebook.svg" alt="Follow White Water Titans on Facebook">
      </a>
      <a href="https://linkedin.com" target="_blank">
        <img src="images/linkedin.svg" alt="Connect with our team on LinkedIn">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="images/instagram.svg"
          alt="Follow White Water Titans on Instagram for regular rapid running photos">
      </a>
    </nav>
  </footer>
</body>

</html>
