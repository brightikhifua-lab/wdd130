<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Titans</title>
  <meta name="description"
    content="Get in touch with White Water Titans. Plan your next river rafting adventure, check out our office location, meet our senior river guides, or send us an inquiry.">
  <meta name="author" content="Ikhifua Bright Ifiok">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <header>
    <div class="logo-box">
      <img src="images/logo.png" alt="White Water Titans Logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="company-heading">
      <h1>White Water Titans</h1>
      <p class="company-address">
        <strong>Titan Headquarters Location</strong><br>
        123 Main River Street<br>
        Salmon, Idaho<br>
        Phone: +1 (208) 555-3891<br>
        Email: info@whitewatertitans.com
      </p>
    </section>

    <div class="contact-grid">
      <div class="map-box">
        <iframe
          src="https://maps.google.com/maps?q=Salmon,%20Idaho&t=&z=13&ie=UTF8&iwloc=&output=embed"
          width="600" height="450" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>

      <div class="form-box">
        <form action="#" method="post">
          <div class="input-control">
            <label for="visitor-name">Name</label>
            <input type="text" id="visitor-name" name="visitor-name" placeholder="Your Name"
              required>
          </div>

          <div class="input-control">
            <label for="visitor-email">Email Address</label>
            <input type="email" id="visitor-email" name="visitor-email" placeholder="Your Email"
              required>
          </div>

          <fieldset class="purpose-selection">
            <legend>Message Purpose Selection</legend>
            <div class="radio-item">
              <input type="radio" id="general" name="purpose" value="general" checked>
              <label for="general">General Inquiry</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="reservation" name="purpose" value="reservation">
              <label for="reservation">Reservation Question</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="suggestion" name="purpose" value="suggestion">
              <label for="suggestion">Website Suggestion</label>
            </div>
          </fieldset>

          <div class="input-control">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Type your message here..."
              required></textarea>
          </div>

          <div class="checkbox-control">
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
          </div>

          <button type="submit">Get in Touch!</button>
        </form>
      </div>
    </div>

    <section class="management-section">
      <h2>Meet Our Senior River Guides</h2>
      <div class="management-grid">
        <figure>
          <img src="images/hero.jpg"
            alt="Portrait photo of Marcus Vance, Lead Safety Coordinator at White Water Titans">
          <figcaption><strong>Marcus Vance</strong><br>Lead Safety Coordinator</figcaption>
        </figure>
        <figure>
          <img src="images/hero.jpg"
            alt="Portrait photo of Elena Rostova, Rapid Logistics Director at White Water Titans">
          <figcaption><strong>Elena Rostova</strong><br>Rapid Logistics Director</figcaption>
        </figure>
        <figure>
          <img src="images/hero.jpg"
            alt="Portrait photo of Ikhifua Bright Ifiok, Founder and Master Guide at White Water Titans">
          <figcaption><strong>Ikhifua Bright Ifiok</strong><br>Founder & Master Guide</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer>
    <p>©2026 ❖ White Water Titans ❖ Ikhifua Bright Ifiok</p>
    <nav class="socialmedia">
      <a href="https://facebook.com" target="_blank">
        <img src="images/facebook.svg" alt="Follow White Water Titans on Facebook">
      </a>
      <a href="https://linkedin.com" target="_blank">
        <img src="images/linkedin.svg" alt="Connect with our team on LinkedIn">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="images/instagram.svg"
          alt="Follow White Water Titans on Instagram for regular rapid running photos">
      </a>
    </nav>
  </footer>
</body>

</html>
